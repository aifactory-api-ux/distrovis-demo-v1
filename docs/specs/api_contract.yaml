# API_CONTRACT.md

## /api/plantas

### GET /api/plantas

| Field      | Type   | Required |
|------------|--------|----------|
| (none)     |        |          |

- **Request Body:** None
- **Response:** Array of `Planta` objects

#### Planta

| Field     | Type   |
|-----------|--------|
| id        | int    |
| nombre    | str    |
| ubicacion | str    |

- **Status Codes:** 200
- **Auth required:** No

---

### POST /api/plantas

| Field      | Type   | Required |
|------------|--------|----------|
| nombre     | str    | Yes      |
| ubicacion  | str    | Yes      |

- **Request Body:** `PlantaCreate`

#### PlantaCreate

| Field     | Type   |
|-----------|--------|
| nombre    | str    |
| ubicacion | str    |

- **Response:** `Planta`

#### Planta

| Field     | Type   |
|-----------|--------|
| id        | int    |
| nombre    | str    |
| ubicacion | str    |

- **Status Codes:** 200
- **Auth required:** No

---

