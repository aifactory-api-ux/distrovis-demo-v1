## /api/ordenes

### GET /api/ordenes

| Field      | Type   | Required |
|------------|--------|----------|
| (none)     |        |          |

- **Request Body:** None
- **Response:** Array of `Orden` objects

#### Orden

| Field               | Type      |
|---------------------|-----------|
| id                  | int       |
| planta_id           | int       |
| centro_id           | int       |
| producto            | str       |
| cantidad            | int       |
| estado              | str       |
| fecha_creacion      | datetime  |
| fecha_actualizacion | datetime  |

- **Status Codes:** 200
- **Auth required:** No

---

### POST /api/ordenes

| Field        | Type   | Required |
|--------------|--------|----------|
| planta_id    | int    | Yes      |
| centro_id    | int    | Yes      |
| producto     | str    | Yes      |
| cantidad     | int    | Yes      |
| estado       | str    | Yes      |

- **Request Body:** `OrdenCreate`

#### OrdenCreate

| Field     | Type   |
|-----------|--------|
| planta_id | int    |
| centro_id | int    |
| producto  | str    |
| cantidad  | int    |
| estado    | str    |

- **Response:** `Orden`

#### Orden

| Field               | Type      |
|---------------------|-----------|
| id                  | int       |
| planta_id           | int       |
| centro_id           | int       |
| producto            | str       |
| cantidad            | int       |
| estado              | str       |
