version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: distrovis-backend
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./distroviz.db}
      - BACKEND_HOST=${BACKEND_HOST:-0.0.0.0}
      - BACKEND_PORT=${BACKEND_PORT:-8001}
      - TZ=${TZ:-America/Mexico_City}
    volumes:
      - distrovis-data:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8001/api
    container_name: distrovis-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT:-5173}
      - VITE_API_URL=http://backend:8001/api
      - TZ=${TZ:-America/Mexico_City}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  distrovis-data: